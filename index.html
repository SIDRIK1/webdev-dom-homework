<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <ul class="comments">
      <li class="comment">
        <div class="comment-header">
          <div>Глеб Фокин</div>
          <div>12.02.22 12:18</div>
        </div>
        <div class="comment-body">
          <div class="comment-text">
            Это будет первый комментарий на этой странице
          </div>
        </div>
        <div class="comment-footer">
          <div class="likes">
            <span class="likes-counter">3</span>
            <button class="like-button"></button>
          </div>
        </div>
      </li>
      <li class="comment">
        <div class="comment-header">
          <div>Варвара Н.</div>
          <div>13.02.22 19:22</div>
        </div>
        <div class="comment-body">
          <div class="comment-text">
            Мне нравится как оформлена эта страница! ❤
          </div>
        </div>
        <div class="comment-footer">
          <div class="likes">
            <span class="likes-counter">75</span>
            <button class="like-button -active-like"></button>
          </div>
        </div>
      </li>
    </ul>
    <div class="add-form">
      <input type="text" class="add-form-name" placeholder="Введите ваше имя" />
      <textarea type="textarea" class="add-form-text" placeholder="Введите ваш коментарий" rows="4"></textarea>
      <div class="add-form-row">
        <button class="add-form-button">Написать</button>
      </div>
    </div>
  </div>
</body>

<script>
  "use strict";
  // Код писать здесь

  const CommentListNach = document.querySelector('.comments')
  const CommentList = CommentListNach.innerHTML
  const LikesElements = document.querySelectorAll('.like-button')



  document.querySelector('.add-form-button').addEventListener('click', () => {
    const commentsList = document.querySelector('.comments');
    const nameInput = document.querySelector('.add-form-name').value;
    const textInput = document.querySelector('.add-form-text').value;
    const now = new Date();
    const dateStr = `${now.getDate().toString().padStart(2, '0')}.${(now.getMonth() + 1).toString().padStart(2, '0')}.${now.getFullYear().toString().slice(-2)} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    const randomLikes = Math.floor(Math.random() * 101);

    if (!nameInput.trim() || !textInput.trim()) {
      alert('Заполните имя и комментарий!');
      return;
    }

    const commentHTML = `
    <li class="comment">
      <div class="comment-header">
        <div>${nameInput}</div>
        <div>${dateStr}</div>
      </div>
      <div class="comment-body">
        <div class="comment-text">${textInput}</div>
      </div>
      <div class="comment-footer">
        <div class="likes">
          <span class="likes-counter">${randomLikes}</span>
          <button class="like-button" title="Лайк" data-like=""></button>
        </div>
      </div>
    </li>
  `;

    commentsList.insertAdjacentHTML('beforeend', commentHTML);

    document.querySelector('.add-form-name').value = '';
    document.querySelector('.add-form-text').value = '';

    const LikesElements = document.querySelectorAll('.like-button')
    const CounterElements = document.querySelectorAll('.likes-counter')
    const test2End = document.querySelectorAll('.likes')

    const likeButtons = document.querySelectorAll('.like-button');

    likeButtons.forEach(button => {
      button.addEventListener('click', () => {
        const likesContainer = button.closest('.likes');  
        const counter = likesContainer.querySelector('.likes-counter');  
        const currentLikes = parseInt(counter.textContent);  

        
        button.classList.toggle('-active-like');

        
        if (button.classList.contains('-active-like')) {
          counter.textContent = currentLikes + 1;
        } else {
          counter.textContent = currentLikes - 1;
        }
      });
    });
  });







  console.log("It works!");
</script>

</html>
